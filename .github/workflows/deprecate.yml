name: Deprecate npm package

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/deprecate.yml'

jobs:
  deprecate:
    name: Deprecate base-mcp on npm
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      id-token: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Set auth token
        run: npm config set '//registry.npmjs.org/:_authToken' "${{ secrets.NPM_TOKEN }}"

      - name: Deprecate package
        run: npm deprecate base-mcp "This package has been deprecated. See https://docs.base.org/ai-agents for the new Base AI Agents docs."
